services:

  detector:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8000:8000"          # Prometheus /metrics
    environment:
      TETRAGON_ADDR:      ${TETRAGON_ADDR:-10.200.118.136:30321}
      ARTIFACTS_DIR:      /artifacts
      TARGET_NAMESPACE:   ${TARGET_NAMESPACE:-demo}
      KERNEL_VER:         ${KERNEL_VER:-6.17}
      # Threshold: 0 means "use the trained T_0 from results.json". The model
      # writes the threshold the training-side strategy picked (paper §IV.B.3:
      # T_0 = p99.5 of benign-val recon error when THRESHOLD_STRATEGY=p995, else
      # F1-optimal on the val sweep). Override only for ad-hoc tuning.
      THRESHOLD:          ${THRESHOLD:-0}
      # Online EMA threshold (paper §IV.B.3 Eq. 3): set EMA_ENABLED=1 to start
      # adapting T at runtime — T moves toward recent non-flagged scores so the
      # detector tracks normal-behaviour drift. Defaults match the paper, but
      # EMA_TMIN=0.5 was calibrated to a VAE-recon score scale; for our
      # RobustScaled ensemble you may want EMA_TMIN ≈ trained T_0 (see
      # results.json -> models.ensemble.threshold). The evolving T is exported
      # as `desfam_threshold` and visualised by the EMA Grafana panel.
      EMA_ENABLED:        ${EMA_ENABLED:-0}
      EMA_BETA:           ${EMA_BETA:-0.9}
      EMA_TMIN:           ${EMA_TMIN:-0.5}
      WINDOW_LEN:         ${WINDOW_LEN:-15}
      WINDOW_STRIDE:      ${WINDOW_STRIDE:-3}
      MAX_IDLE_SECS:      ${MAX_IDLE_SECS:-30}
      FLUSH_INTERVAL:     ${FLUSH_INTERVAL:-5}
      ALERT_CONSECUTIVE:  ${ALERT_CONSECUTIVE:-1}
      SCORES_ONLY:        ${SCORES_ONLY:-1}
      # Run a one-shot calibration of N seconds: sample live scores, print
      # percentile-based threshold recommendations, then exit. Set to 0 (default)
      # in steady-state.
      CALIBRATE_SECS:     ${CALIBRATE_SECS:-0}
      TF_CPP_MIN_LOG_LEVEL: "2"
    volumes:
      - ${ARTIFACTS_DIR_HOST:-../model}:/artifacts:ro
    restart: unless-stopped
    # All args come from env defaults in detect.py's argparse — no CLI flags needed.
    command: python detect.py

  prometheus:
    image: prom/prometheus:v2.51.2
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    ports:
      - "9090:9090"
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--storage.tsdb.retention.time=7d'
      - '--web.enable-lifecycle'
      - '--web.enable-admin-api'
    restart: unless-stopped

  grafana:
    image: grafana/grafana:10.4.3
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_AUTH_ANONYMOUS_ENABLED: "true"
      GF_AUTH_ANONYMOUS_ORG_ROLE: Viewer
      GF_USERS_ALLOW_SIGN_UP: "false"
      GF_DASHBOARDS_DEFAULT_HOME_DASHBOARD_PATH: /var/lib/grafana/dashboards/desfam.json
    volumes:
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      - ./grafana/dashboards:/var/lib/grafana/dashboards:ro
      - grafana_data:/var/lib/grafana
    restart: unless-stopped
    depends_on:
      - prometheus

volumes:
  prometheus_data:
  grafana_data:
