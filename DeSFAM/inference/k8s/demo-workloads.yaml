---
# Five extra demo workloads to complete the 6-workload baseline from the slide
# (Nginx is already deployed in ns demo from a prior session). All passwords are
# test-only and intentionally not secret-managed — this namespace is dedicated
# to live-inference traffic against Tetragon.
apiVersion: v1
kind: Secret
metadata:
  name: demo-db-secrets
  namespace: demo
type: Opaque
stringData:
  mysql-root-password: desfam-test-only
  mongo-root-password: desfam-test-only
---
# ---------- MySQL 8.0 ----------
apiVersion: apps/v1
kind: Deployment
metadata:
  name: mysql
  namespace: demo
  labels: { app: mysql }
spec:
  replicas: 1
  selector: { matchLabels: { app: mysql } }
  template:
    metadata:
      labels: { app: mysql }
    spec:
      containers:
      - name: mysql
        image: mysql:8.0
        ports: [{ containerPort: 3306 }]
        env:
        - name: MYSQL_ROOT_PASSWORD
          valueFrom: { secretKeyRef: { name: demo-db-secrets, key: mysql-root-password } }
        - { name: MYSQL_DATABASE, value: demo }
        resources:
          requests: { cpu: "100m", memory: "384Mi" }
          limits:   { cpu: "1",    memory: "1Gi"   }
---
apiVersion: v1
kind: Service
metadata: { name: mysql, namespace: demo }
spec:
  selector: { app: mysql }
  ports: [{ port: 3306, targetPort: 3306 }]
---
# ---------- Redis 7.2 ----------
apiVersion: apps/v1
kind: Deployment
metadata:
  name: redis
  namespace: demo
  labels: { app: redis }
spec:
  replicas: 1
  selector: { matchLabels: { app: redis } }
  template:
    metadata: { labels: { app: redis } }
    spec:
      containers:
      - name: redis
        image: redis:7.2-alpine
        ports: [{ containerPort: 6379 }]
        resources:
          requests: { cpu: "50m",  memory: "64Mi"  }
          limits:   { cpu: "500m", memory: "256Mi" }
---
apiVersion: v1
kind: Service
metadata: { name: redis, namespace: demo }
spec:
  selector: { app: redis }
  ports: [{ port: 6379, targetPort: 6379 }]
---
# ---------- Node.js 20 (tiny echo HTTP server) ----------
apiVersion: v1
kind: ConfigMap
metadata: { name: node-app, namespace: demo }
data:
  server.js: |
    const http = require('http');
    const port = 3000;
    http.createServer((req, res) => {
      res.writeHead(200, { 'Content-Type': 'application/json' });
      res.end(JSON.stringify({ ok: true, path: req.url, ts: Date.now() }));
    }).listen(port, () => console.log('node echo listening on', port));
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: node-app
  namespace: demo
  labels: { app: node-app }
spec:
  replicas: 1
  selector: { matchLabels: { app: node-app } }
  template:
    metadata: { labels: { app: node-app } }
    spec:
      containers:
      - name: node
        image: node:20-alpine
        command: ["node", "/srv/server.js"]
        ports: [{ containerPort: 3000 }]
        volumeMounts: [{ name: code, mountPath: /srv }]
        resources:
          requests: { cpu: "50m",  memory: "64Mi"  }
          limits:   { cpu: "500m", memory: "256Mi" }
      volumes:
      - name: code
        configMap: { name: node-app }
---
apiVersion: v1
kind: Service
metadata: { name: node-app, namespace: demo }
spec:
  selector: { app: node-app }
  ports: [{ port: 3000, targetPort: 3000 }]
---
# ---------- Python 3.12 (stdlib http.server) ----------
apiVersion: apps/v1
kind: Deployment
metadata:
  name: python-app
  namespace: demo
  labels: { app: python-app }
spec:
  replicas: 1
  selector: { matchLabels: { app: python-app } }
  template:
    metadata: { labels: { app: python-app } }
    spec:
      containers:
      - name: python
        image: python:3.12-slim
        command: ["python", "-u", "-m", "http.server", "8080"]
        workingDir: /tmp
        ports: [{ containerPort: 8080 }]
        resources:
          requests: { cpu: "50m",  memory: "64Mi"  }
          limits:   { cpu: "500m", memory: "256Mi" }
---
apiVersion: v1
kind: Service
metadata: { name: python-app, namespace: demo }
spec:
  selector: { app: python-app }
  ports: [{ port: 8080, targetPort: 8080 }]
---
# ---------- MongoDB 7.0 ----------
apiVersion: apps/v1
kind: Deployment
metadata:
  name: mongodb
  namespace: demo
  labels: { app: mongodb }
spec:
  replicas: 1
  selector: { matchLabels: { app: mongodb } }
  template:
    metadata: { labels: { app: mongodb } }
    spec:
      containers:
      - name: mongo
        image: mongo:7.0
        ports: [{ containerPort: 27017 }]
        env:
        - { name: MONGO_INITDB_ROOT_USERNAME, value: root }
        - name: MONGO_INITDB_ROOT_PASSWORD
          valueFrom: { secretKeyRef: { name: demo-db-secrets, key: mongo-root-password } }
        resources:
          requests: { cpu: "100m", memory: "384Mi" }
          limits:   { cpu: "1",    memory: "1Gi"   }
---
apiVersion: v1
kind: Service
metadata: { name: mongodb, namespace: demo }
spec:
  selector: { app: mongodb }
  ports: [{ port: 27017, targetPort: 27017 }]
