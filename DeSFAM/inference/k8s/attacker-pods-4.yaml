---
# Four CVE-simulator pods — one per attack scenario from the slide deck.
# Reuses the attack-sims ConfigMap (created earlier).
apiVersion: v1
kind: Pod
metadata:
  name: attacker-dirty-pipe
  namespace: demo
  labels: { app: attacker, cve: cve-2022-0847 }
spec:
  restartPolicy: Never
  containers:
  - name: attacker
    image: python:3.12-slim
    command: ["sleep", "99999"]
    volumeMounts: [{ name: sims, mountPath: /sim }]
    resources: { requests: { cpu: 50m, memory: 64Mi }, limits: { cpu: 500m, memory: 256Mi } }
  volumes: [{ name: sims, configMap: { name: attack-sims } }]
