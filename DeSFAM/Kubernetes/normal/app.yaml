# Normal workload: simulates a realistic application —
# periodic file I/O, outbound HTTP, in-process computation.
# Provides the "benign baseline" for the anomaly detector.
apiVersion: v1
kind: Pod
metadata:
  name: normal-app
  namespace: demo
  labels:
    role: normal
    scenario: app-workload
spec:
  restartPolicy: Always
  containers:
  - name: app
    image: ubuntu:22.04
    command:
    - bash
    - -c
    - |
      apt-get install -qq -y curl ca-certificates > /dev/null 2>&1
      while true; do
        # File I/O: read/write temp files (mimics log rotation, config reads)
        for f in /tmp/data_{1..5}.txt; do
          dd if=/dev/urandom bs=512 count=4 2>/dev/null > $f
          cat $f > /dev/null
        done

        # Computation: sort, grep, awk (mimics data processing)
        seq 1 500 | sort -R | awk '{sum+=$1} END{print sum}' > /dev/null

        # Outbound HTTP (mimics health check / telemetry)
        curl -sf --max-time 3 http://nginx/healthz > /dev/null 2>&1 || true

        sleep 15
      done
    resources:
      requests: { cpu: 10m, memory: 32Mi }
      limits:   { cpu: 100m, memory: 64Mi }
