# Promtail DaemonSet — scrapes pod logs and pushes to Loki.
# SCOPED to namespaces kube-system (the Tetragon `export-stdout` container, which
# streams syscall events as JSON) and demo (the workloads under inference). This
# keeps other tenants' logs on the shared cluster out of Loki.
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: promtail
  namespace: monitoring
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: promtail
rules:
  - apiGroups: [""]
    resources: ["nodes", "services", "pods"]
    verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: promtail
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: promtail
subjects:
  - kind: ServiceAccount
    name: promtail
    namespace: monitoring
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: promtail-config
  namespace: monitoring
data:
  promtail.yaml: |
    server:
      http_listen_port: 9080
    positions:
      filename: /run/promtail/positions.yaml
    clients:
      - url: http://loki:3100/loki/api/v1/push
    scrape_configs:
      # Tetragon syscall-event stream: the `export-stdout` container prints every
      # event as JSON. Tail its node log file directly (deterministic path) — no
      # kubernetes service-discovery, which returns 0 pods on this CFKE cluster.
      - job_name: tetragon-events
        static_configs:
          - targets: [localhost]
            labels:
              namespace: kube-system
              container: export-stdout
              stream: tetragon
              __path__: /var/log/pods/kube-system_tetragon-*/export-stdout/*.log
        pipeline_stages:
          - cri: {}
      # Demo workload logs (context alongside the syscall events).
      - job_name: demo-workloads
        static_configs:
          - targets: [localhost]
            labels:
              namespace: demo
              __path__: /var/log/pods/demo_*/*/*.log
        pipeline_stages:
          - cri: {}
          - regex:
              source: filename
              expression: '/var/log/pods/[^_]+_(?P<pod>[^_]+)_[^/]+/(?P<container>[^/]+)/'
          - labels:
              pod:
              container:
---
apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: promtail
  namespace: monitoring
  labels: { app: promtail }
spec:
  selector: { matchLabels: { app: promtail } }
  template:
    metadata:
      labels: { app: promtail }
    spec:
      serviceAccountName: promtail
      containers:
        - name: promtail
          image: grafana/promtail:2.9.8
          args: ["-config.file=/etc/promtail/promtail.yaml"]
          env:
            - name: NODE_NAME
              valueFrom: { fieldRef: { fieldPath: spec.nodeName } }
          ports:
            - { name: http, containerPort: 9080 }
          resources:
            requests: { cpu: "50m",  memory: "64Mi" }
            limits:   { cpu: "200m", memory: "256Mi" }
          volumeMounts:
            - { name: config,    mountPath: /etc/promtail }
            - { name: run,       mountPath: /run/promtail }
            - { name: pods,      mountPath: /var/log/pods, readOnly: true }
            - { name: containers, mountPath: /var/log/containers, readOnly: true }
      volumes:
        - name: config
          configMap: { name: promtail-config }
        - name: run
          emptyDir: {}
        - name: pods
          hostPath: { path: /var/log/pods }
        - name: containers
          hostPath: { path: /var/log/containers }
