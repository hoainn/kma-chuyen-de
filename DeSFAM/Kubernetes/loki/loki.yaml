# Loki single-binary (filesystem, ephemeral) for surfacing Tetragon event logs
# in the DeSFAM Grafana dashboard. Exposed via NodePort so the local
# docker-compose Grafana can add it as a datasource (same path the detector uses
# to reach the Tetragon gRPC NodePort).
#
#   kubectl apply -f loki.yaml
#   Grafana datasource URL: http://<node-ip>:31100   (node 10.200.118.136)
---
apiVersion: v1
kind: Namespace
metadata:
  name: monitoring
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: loki-config
  namespace: monitoring
data:
  loki.yaml: |
    auth_enabled: false
    server:
      http_listen_port: 3100
      grpc_listen_port: 9095
    common:
      path_prefix: /loki
      storage:
        filesystem:
          chunks_directory: /loki/chunks
          rules_directory: /loki/rules
      replication_factor: 1
      ring:
        instance_addr: 127.0.0.1
        kvstore:
          store: inmemory
    schema_config:
      configs:
        - from: 2020-10-24
          store: boltdb-shipper
          object_store: filesystem
          schema: v11
          index:
            prefix: index_
            period: 24h
    limits_config:
      reject_old_samples: false
      retention_period: 72h
    analytics:
      reporting_enabled: false
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: loki
  namespace: monitoring
  labels: { app: loki }
spec:
  replicas: 1
  selector: { matchLabels: { app: loki } }
  template:
    metadata:
      labels: { app: loki }
    spec:
      containers:
        - name: loki
          image: grafana/loki:2.9.8
          args: ["-config.file=/etc/loki/loki.yaml"]
          ports:
            - { name: http, containerPort: 3100 }
            - { name: grpc, containerPort: 9095 }
          readinessProbe:
            httpGet: { path: /ready, port: 3100 }
            initialDelaySeconds: 15
            periodSeconds: 10
          resources:
            requests: { cpu: "100m", memory: "256Mi" }
            limits:   { cpu: "1",    memory: "1Gi" }
          volumeMounts:
            - { name: config, mountPath: /etc/loki }
            - { name: data,   mountPath: /loki }
      volumes:
        - name: config
          configMap: { name: loki-config }
        - name: data
          emptyDir: {}
---
# In-cluster service (Promtail pushes here)
apiVersion: v1
kind: Service
metadata:
  name: loki
  namespace: monitoring
  labels: { app: loki }
spec:
  selector: { app: loki }
  ports:
    - { name: http, port: 3100, targetPort: 3100 }
---
# NodePort so the local Grafana (docker-compose) can reach Loki as a datasource.
apiVersion: v1
kind: Service
metadata:
  name: loki-nodeport
  namespace: monitoring
  labels: { app: loki }
spec:
  type: NodePort
  selector: { app: loki }
  ports:
    - { name: http, port: 3100, targetPort: 3100, nodePort: 31100 }
