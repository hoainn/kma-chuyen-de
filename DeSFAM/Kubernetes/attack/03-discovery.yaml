# MITRE ATT&CK TA0007 — Discovery: container/host/network enumeration
# Cited in: Stratus Red Team, Tetragon blog, Falco rules,
#           DeSFAM paper (reconnaissance phase), ADFA-LD /proc scanning
#
# Distinctive syscall pattern:
#   getdents64 on /proc/[0-9]* (mass process enumeration)
#   openat("/proc/<pid>/cmdline") × N  → read × N
#   socket(AF_INET) → connect (port probe)  repeated
#   stat("/proc/sys/kernel/..."), mount
apiVersion: v1
kind: Pod
metadata:
  name: attack-discovery
  namespace: demo
  labels:
    role: attack
    scenario: discovery
    mitre: TA0007
spec:
  restartPolicy: Always
  containers:
  - name: attacker
    image: ubuntu:22.04
    command:
    - bash
    - -c
    - |
      while true; do
        # /proc enumeration — reads cmdline of every running process
        for pid in /proc/[0-9]*; do
          cat "$pid/cmdline" 2>/dev/null | tr '\0' ' '
        done

        # SUID binary discovery (privilege escalation prep)
        find / -maxdepth 5 -perm -u=s -type f 2>/dev/null

        # Mounted filesystem discovery
        cat /proc/mounts 2>/dev/null
        cat /proc/net/fib_trie 2>/dev/null | head -40

        # Internal network port probe via /dev/tcp (pure bash, no nc needed)
        for port in 22 80 443 3306 5432 6379 8080; do
          (bash -c "echo > /dev/tcp/nginx/$port" 2>/dev/null && echo "open: $port") || true
        done

        # Kernel info
        cat /proc/version 2>/dev/null
        cat /proc/sys/kernel/hostname 2>/dev/null

        sleep 20
      done
    resources:
      requests: { cpu: 10m, memory: 32Mi }
      limits:   { cpu: 100m, memory: 64Mi }
