# MITRE ATT&CK TA0002 — Execution: Shell spawned inside container
# Cited in: DeepLog, LSTM-AD, SyscallAD, Falco rules, ADFA-LD benchmark
#
# Distinctive syscall pattern:
#   execve(bash) → clone → execve(id/whoami/ls) → wait4 → exit
# Most basic and universally tested scenario in syscall anomaly detection papers.
apiVersion: v1
kind: Pod
metadata:
  name: attack-shell-spawn
  namespace: demo
  labels:
    role: attack
    scenario: shell-spawn
    mitre: TA0002
spec:
  restartPolicy: Always
  containers:
  - name: attacker
    image: ubuntu:22.04
    command:
    - bash
    - -c
    - |
      while true; do
        # Spawn subshells executing recon commands — classic "shell in container" pattern
        bash -c "id && whoami && hostname"
        bash -c "ls -la /etc/ && cat /etc/os-release"
        bash -c "ps aux && env"
        bash -c "uname -a && uptime"
        sleep 20
      done
    resources:
      requests: { cpu: 10m, memory: 32Mi }
      limits:   { cpu: 200m, memory: 64Mi }
