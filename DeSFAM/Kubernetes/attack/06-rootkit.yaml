# MITRE ATT&CK TA0005 -- Defense Evasion: rootkit-like behavior
# Cited in: DeSFAM paper (kernel-level attacks), ADFA-LD advanced scenarios,
#           Sysdig container escape research, Aqua Security rootkit detection
#
# Distinctive syscall pattern:
#   openat("/proc/kallsyms") -- kernel symbol table read
#   openat("/proc/kcore")    -- kernel memory access
#   unshare(CLONE_NEWPID)    -- namespace manipulation
#   mount(...)               -- filesystem remount attempt
#   openat + write on /proc/sys/kernel/* -- kernel param tampering attempt
apiVersion: v1
kind: Pod
metadata:
  name: attack-rootkit
  namespace: demo
  labels:
    role: attack
    scenario: rootkit
    mitre: TA0005
spec:
  restartPolicy: Always
  containers:
  - name: attacker
    image: ubuntu:22.04
    command:
    - bash
    - -c
    - |
      while true; do
        # Read kernel symbol table (rootkit reconnaissance)
        head -100 /proc/kallsyms 2>/dev/null || true

        # Access kernel memory map
        cat /proc/kcore 2>/dev/null | head -c 64 || true

        # Kernel parameter read/write attempts
        cat /proc/sys/kernel/dmesg_restrict 2>/dev/null || true
        cat /proc/sys/kernel/kptr_restrict 2>/dev/null || true
        echo 0 > /proc/sys/kernel/dmesg_restrict 2>/dev/null || true

        # Namespace manipulation (unshare -- rootkit isolation technique)
        unshare --pid --fork echo "pid-ns" 2>/dev/null || true
        unshare --mount echo "mnt-ns" 2>/dev/null || true

        # Mount attempt (overlayfs hiding technique)
        mount --bind /tmp /proc/1 2>/dev/null || true

        # Attempt kernel module load (insmod with empty payload)
        dd if=/dev/zero bs=64 count=1 2>/dev/null | insmod /dev/stdin 2>/dev/null || true

        # Access other processes memory maps
        for pid in $(ls /proc | grep -E "^[0-9]+$" | shuf | head -5); do
          cat /proc/${pid}/maps 2>/dev/null | head -5 || true
          cat /proc/${pid}/mem  2>/dev/null | head -c 8 || true
        done

        sleep 30
      done
    resources:
      requests:
        cpu: 10m
        memory: 32Mi
      limits:
        cpu: 100m
        memory: 64Mi
