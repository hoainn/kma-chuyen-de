# MITRE ATT&CK TA0006 — Credential Access: reading sensitive files and secrets
# Cited in: Falco (rule: read_sensitive_file), Tetragon getting-started,
#           ADFA-LD (adduser attack), most IDS benchmark papers
#
# Distinctive syscall pattern:
#   openat("/etc/shadow", O_RDONLY) → read → close
#   openat("/run/secrets/...") → read  (K8s service account tokens)
#   getdents64 on sensitive dirs
apiVersion: v1
kind: Pod
metadata:
  name: attack-credential-access
  namespace: demo
  labels:
    role: attack
    scenario: credential-access
    mitre: TA0006
spec:
  restartPolicy: Always
  containers:
  - name: attacker
    image: ubuntu:22.04
    command:
    - bash
    - -c
    - |
      while true; do
        # OS credential files
        cat /etc/shadow    2>/dev/null || true
        cat /etc/passwd
        cat /etc/sudoers   2>/dev/null || true

        # K8s service account token (always present in pods)
        cat /var/run/secrets/kubernetes.io/serviceaccount/token 2>/dev/null || true
        cat /var/run/secrets/kubernetes.io/serviceaccount/ca.crt 2>/dev/null || true

        # Search for keys/certs on filesystem
        find / -maxdepth 4 \( -name "*.pem" -o -name "*.key" -o -name "id_rsa" \
          -o -name ".env" -o -name "credentials" \) 2>/dev/null | head -10

        # Environment variables (tokens, passwords)
        env | grep -iE "secret|token|password|key|auth" 2>/dev/null || true

        sleep 25
      done
    resources:
      requests: { cpu: 10m, memory: 32Mi }
      limits:   { cpu: 100m, memory: 64Mi }
