# MITRE ATT&CK TA0040 — Impact: Cryptomining
# Most common real-world cloud attack; used in virtually every
# K8s security paper (Sysdig 2023 threat report, Falco rules, Tetragon blog,
# Microsoft Defender for Containers, Aqua Security research)
#
# Distinctive syscall pattern:
#   clone × N (worker threads) + tight compute loop (no sleep)
#   socket(AF_INET, SOCK_STREAM) → connect(stratum port 3333/4444/14444)
#   setsockopt, send/recv in mining protocol loop
apiVersion: v1
kind: Pod
metadata:
  name: attack-cryptominer
  namespace: demo
  labels:
    role: attack
    scenario: cryptominer
    mitre: TA0040
spec:
  restartPolicy: Always
  containers:
  - name: miner
    image: ubuntu:22.04
    command:
    - bash
    - -c
    - |
      while true; do
        # CPU-intensive mining simulation: tight SHA-like computation loop
        # Forks multiple workers — mimics multi-threaded miner
        for worker in $(seq 1 4); do
          (
            count=0
            while [ $count -lt 20000 ]; do
              echo "$RANDOM$RANDOM$RANDOM" | sha256sum > /dev/null
              count=$((count + 1))
            done
          ) &
        done
        wait

        # Attempt outbound connection to known mining pool ports
        # (stratum protocol: xmrig default ports)
        for host in pool.hashvault.pro pool.supportxmr.com xmrpool.eu; do
          (bash -c "echo > /dev/tcp/$host/3333" 2>/dev/null) || true
          (bash -c "echo > /dev/tcp/$host/443"  2>/dev/null) || true
        done

        sleep 5
      done
    resources:
      requests: { cpu: 50m, memory: 32Mi }
      limits:   { cpu: 400m, memory: 64Mi }
