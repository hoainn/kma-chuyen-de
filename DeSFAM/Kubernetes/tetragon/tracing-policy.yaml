apiVersion: cilium.io/v1alpha1
kind: TracingPolicy
metadata:
  name: desfam-syscall-trace
spec:
  kprobes:
    # --- File access ---
    - call: "sys_openat"
      syscall: true
      args:
        - index: 0
          type: "int"
        - index: 1
          type: "string"
        - index: 2
          type: "int"

    - call: "sys_read"
      syscall: true
      args:
        - index: 0
          type: "int"
        - index: 2
          type: "size_t"

    - call: "sys_write"
      syscall: true
      args:
        - index: 0
          type: "int"
        - index: 2
          type: "size_t"

    - call: "sys_close"
      syscall: true
      args:
        - index: 0
          type: "int"

    # --- Process lifecycle ---
    - call: "sys_execve"
      syscall: true
      args:
        - index: 0
          type: "string"

    - call: "sys_clone"
      syscall: true
      args:
        - index: 0
          type: "uint64"

    - call: "sys_wait4"
      syscall: true
      args:
        - index: 0
          type: "int"

    - call: "sys_exit_group"
      syscall: true
      args:
        - index: 0
          type: "int"

    # --- Memory ---
    - call: "sys_mmap"
      syscall: true
      args:
        - index: 1
          type: "size_t"
        - index: 2
          type: "int"

    - call: "sys_mprotect"
      syscall: true
      args:
        - index: 1
          type: "size_t"
        - index: 2
          type: "int"

    # --- Network ---
    - call: "sys_socket"
      syscall: true
      args:
        - index: 0
          type: "int"
        - index: 1
          type: "int"

    - call: "sys_connect"
      syscall: true
      args:
        - index: 0
          type: "int"

    - call: "sys_bind"
      syscall: true
      args:
        - index: 0
          type: "int"

    - call: "sys_accept"
      syscall: true
      args:
        - index: 0
          type: "int"

    - call: "sys_sendto"
      syscall: true
      args:
        - index: 0
          type: "int"
        - index: 2
          type: "size_t"

    - call: "sys_recvfrom"
      syscall: true
      args:
        - index: 0
          type: "int"
        - index: 2
          type: "size_t"

    # --- Filesystem enumeration ---
    - call: "sys_getdents64"
      syscall: true
      args:
        - index: 0
          type: "int"

    - call: "sys_stat"
      syscall: true
      args:
        - index: 0
          type: "string"

    - call: "sys_lstat"
      syscall: true
      args:
        - index: 0
          type: "string"

    # --- Kernel / privilege ---
    - call: "sys_unshare"
      syscall: true
      args:
        - index: 0
          type: "int"

    - call: "sys_init_module"
      syscall: true
      args: []

    - call: "sys_ptrace"
      syscall: true
      args:
        - index: 0
          type: "int"
