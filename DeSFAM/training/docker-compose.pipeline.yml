# DeSFAM training pipeline — `train` is the only default service.
#
# Usage:
#   docker compose -f docker-compose.pipeline.yml up --build --abort-on-container-exit
#     → builds image (if needed) and runs training to completion, then exits.
#
#   docker compose -f docker-compose.pipeline.yml run --rm train
#     → headless one-shot run (image must already be built).
#
# Opt-in: Jupyter Lab (interactive exploration of train_dongting.ipynb)
#   docker compose -f docker-compose.pipeline.yml --profile interactive up jupyter
#   → opens on http://localhost:8888

services:

  # ── DEFAULT SERVICE ──────────────────────────────────────────────────────
  # Fast headless training — runs train.py directly.
  train:
    build:
      context: .
      dockerfile: Dockerfile
    volumes:
      # Full DongTing release (Normal_data/, Abnormal_data/, Baseline.xlsx, syscall_64.tbl)
      - ${DATA_ROOT:-/Users/hoainn/Downloads/6627050}:/data/dongting:ro
      - ${MODEL_DIR:-../model}:/model
      - .:/workspace
    environment:
      DATA_ROOT:   /data/dongting
      DATA_MAX_SEQ_LEN: "50000"
      SYSCALL_TBL: /data/dongting/syscall_64.tbl
      OUTPUT_DIR:  /model
      TF_CPP_MIN_LOG_LEVEL: "2"
      PYTHONUNBUFFERED: "1"
      # Sliding-window training (paper §IV.B.3) — canonical default
      USE_SLIDING_WINDOW: "1"
      WINDOW_LEN:    "15"
      WINDOW_STRIDE: "3"
      # Temporal Δt features: DongTing has no timestamps, keep off.
      USE_TEMPORAL: "0"
      # Sensor-alphabet alignment — restrict DongTing to the 23 syscalls the live
      # Tetragon policy emits, so train/serve windows share a feature space.
      SENSOR_ALPHABET: "1"
      # Alphabet-scoped feature vector. freq covers the COMMON syscalls (per-window
      # frequency); disc covers the REMAINING, rarer alphabet syscalls as BINARY
      # PRESENCE bits. The privileged/escape syscalls (ptrace, splice, unshare,
      # setns, mount, pivot_root, bpf, init/finit_module, capset, memfd_create)
      # are rare in benign workloads, so a presence bit fires on a single such
      # call regardless of how much benign openat dilutes the window — making
      # attacks dilution-robust (plain frequency under-weights a lone ptrace in a
      # 15-openat window). Plus stats_8 (entropy/diversity), cat_K, prefixspan.
      # bigrams stay off (noisy on a 24-symbol alphabet). → ~43 dims.
      TOP_K_FREQ:    "8"
      TOP_K_DISC:    "24"
      TOP_K_BIGRAMS: "0"
      ENABLE_STATS:  "1"
      # Threshold strategy: 'p995' = paper-faithful T_0 (99.5-th of benign-val
      # error); 'f1' = F1-sweep operating point.
      THRESHOLD_STRATEGY: "p995"
      # Cap on windows PER SPLIT (rarely binds now that the alphabet filter
      # shrinks each trace to its sensor syscalls).
      MAX_WINDOWS_PER_SPLIT: "2000000"
    working_dir: /workspace
    command: python train.py

  # ── OPT-IN: interactive Jupyter Lab ──────────────────────────────────────
  # Start with: docker compose -f docker-compose.pipeline.yml --profile interactive up jupyter
  jupyter:
    profiles: ["interactive"]
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8888:8888"
    volumes:
      - ${DATA_ROOT:-/Users/hoainn/Downloads/6627050}:/data/dongting:ro
      - ${MODEL_DIR:-../model}:/model
      - .:/workspace
    environment:
      FEATURE_MODE:    "paper_plus"
      DATA_ROOT:       /data/dongting
      DATA_MAX_SEQ_LEN: "50000"
      SYSCALL_TBL:     /data/dongting/syscall_64.tbl
      OUTPUT_DIR:      /model
      TF_CPP_MIN_LOG_LEVEL: "2"
    working_dir: /workspace
    command: >
      jupyter lab --ip=0.0.0.0 --port=8888 --no-browser --allow-root
        --ServerApp.token='' --ServerApp.password=''
