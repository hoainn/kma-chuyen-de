# Tetragon TracingPolicy — hook high-risk syscalls for DeSFAM detector.
#
# When `syscall: true` is set Tetragon auto-prefixes the syscall name with
# the running architecture's prefix (__x64_sys_ or __arm64_sys_). Always
# use the bare name (e.g. "sys_execve") so the policy is portable across
# architectures.
#
# Apply: kubectl apply -f tracing-policy-syscalls.yaml
apiVersion: cilium.io/v1alpha1
kind: TracingPolicy
metadata:
  name: desfam-syscall-monitor
spec:
  kprobes:
    # Process creation / privilege change
    - call: "sys_execve"
      syscall: true
    - call: "sys_clone"
      syscall: true
    - call: "sys_setuid"
      syscall: true
    - call: "sys_setgid"
      syscall: true
    - call: "sys_capset"
      syscall: true

    # Filesystem access (open/unlink — common in attacks)
    - call: "sys_openat"
      syscall: true
    - call: "sys_unlinkat"
      syscall: true
    - call: "sys_renameat2"
      syscall: true

    # Container-escape primitives
    - call: "sys_mount"
      syscall: true
    - call: "sys_unshare"
      syscall: true
    - call: "sys_setns"
      syscall: true
    - call: "sys_pivot_root"
      syscall: true

    # Network entry points (lateral movement / C2)
    - call: "sys_socket"
      syscall: true
    - call: "sys_connect"
      syscall: true
    - call: "sys_bind"
      syscall: true

    # Kernel-memory / IPC primitives used by CVEs the paper covers
    - call: "sys_splice"
      syscall: true
    - call: "sys_ptrace"
      syscall: true
    - call: "sys_init_module"
      syscall: true
    - call: "sys_finit_module"
      syscall: true
    - call: "sys_bpf"
      syscall: true
