services:

  mongo:
    image: mongo:6
    container_name: dongting_mongo
    volumes:
      - mongo_data:/data/db
    ports:
      - "27017:27017"
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 15s

  mongo-init:
    image: mongo:6
    container_name: dongting_init
    depends_on:
      mongo:
        condition: service_healthy
    volumes:
      - ../../experiment/data/dongting/DB:/dongting-db:ro
      - ./init-mongo.sh:/init-mongo.sh:ro
    command: ["bash", "/init-mongo.sh"]

  jupyter:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: dongting_jupyter
    depends_on:
      - mongo
    ports:
      - "8888:8888"
    volumes:
      - .:/workspace
      - ../outputs:/workspace/outputs
      - ../../experiment/data:/workspace/data:ro
    environment:
      - MONGO_URI=mongodb://mongo:27017/
      - MONGO_DB=syzbot_DB
    working_dir: /workspace
    command: >
      jupyter lab
        --ip=0.0.0.0
        --port=8888
        --no-browser
        --allow-root
        --NotebookApp.token=''
        --NotebookApp.password=''

volumes:
  mongo_data:
